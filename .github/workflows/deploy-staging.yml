name: Deploy Vue Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vue-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Vue to staging EC2
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e
            APP_DIR="${{ secrets.EC2_VUE_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/Audittool-vue"; fi
            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main
            git clean -fdx
            export APP_VERSION="$(git rev-parse --short HEAD)"
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f
            echo "Vue staging deployed from $APP_DIR ($APP_VERSION)"
