name: Deploy Vue Staging

# Prefer Audittool repo workflow deploy-vue-staging.yml (reuses EC2 secrets).
# This workflow is manual-only until staging secrets are added to Audittool-vue.

on:
  workflow_dispatch:

concurrency:
  group: deploy-vue-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Vue to staging EC2
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e
            APP_DIR="${{ secrets.EC2_VUE_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/Audittool-vue"; fi
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/cvsanten/Audittool-vue.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main
            git clean -fdx
            export APP_VERSION="$(git rev-parse --short HEAD)"
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f
            if [ -f /etc/caddy/Caddyfile ] && ! grep -q 'vue-staging.christavansanten.org' /etc/caddy/Caddyfile; then
              sudo tee -a /etc/caddy/Caddyfile < deploy/Caddyfile.snippet
              sudo caddy reload --config /etc/caddy/Caddyfile
            fi
            echo "Vue staging deployed from $APP_DIR ($APP_VERSION)"
